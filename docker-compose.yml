services:
  mysql:
    image: mysql:8.4
    container_name: btl_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: BTL_data_mining
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  postgres:
    image: postgres:16
    container_name: btl_airflow_postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow-postgres-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: java/Dockerfile
    container_name: btl_backend
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8081:8080"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: react/Dockerfile
    container_name: btl_frontend
    depends_on:
      - backend
    ports:
      - "5173:80"
    restart: unless-stopped

  airflow-init:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    container_name: btl_airflow_init
    depends_on:
      postgres:
        condition: service_healthy
    environment: &airflow-env
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_FOLDER: /opt/btl_kpdl/airflow/dags
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
      AIRFLOW_UID: 50000
      MINING_PYTHON_EXECUTABLE: python
    user: "50000:0"
    working_dir: /opt/btl_kpdl
    volumes:
      - .:/opt/btl_kpdl
      - airflow-home:/opt/airflow
    command: >
      bash -c "
      airflow db migrate &&
      airflow users create
      --username admin
      --password admin
      --firstname BTL
      --lastname Admin
      --role Admin
      --email admin@example.com || true
      "

  airflow-webserver:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    container_name: btl_airflow_webserver
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    environment: *airflow-env
    user: "50000:0"
    working_dir: /opt/btl_kpdl
    volumes:
      - .:/opt/btl_kpdl
      - airflow-home:/opt/airflow
    ports:
      - "8088:8080"
    command: webserver
    restart: unless-stopped

  airflow-scheduler:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    container_name: btl_airflow_scheduler
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    environment: *airflow-env
    user: "50000:0"
    working_dir: /opt/btl_kpdl
    volumes:
      - .:/opt/btl_kpdl
      - airflow-home:/opt/airflow
    command: scheduler
    restart: unless-stopped

volumes:
  mysql-data:
  airflow-postgres-db:
  airflow-home:
